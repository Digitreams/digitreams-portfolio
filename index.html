<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitreams — AI-Powered Digital Marketing Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508;
  --bg2: #0a0a12;
  --surface: #0f0f1a;
  --card: #131320;
  --card2: #18182a;
  --border: rgba(255,200,0,0.12);
  --border2: rgba(255,200,0,0.25);
  --gold: #FFB800;
  --gold2: #FFD700;
  --gold-dim: rgba(255,184,0,0.15);
  --text: #f0efff;
  --muted: #7a7a9a;
  --muted2: #9a9ab8;
  --green: #00e5a0;
  --red: #ff4d6d;
  --blue: #5b8fff;
  --font-display: 'Heebo', sans-serif;
  --font-ui: 'Heebo', sans-serif;
  --font-body: 'Inter', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow-x: hidden;
}

/* NOISE TEXTURE OVERLAY */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.6;
}

/* GRID BACKGROUND */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,184,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,184,0,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  z-index: 0;
}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

/* ═══ NAV ═══ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 48px;
  background: rgba(5,5,8,0.88);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-logo img {
  width: auto;
  height: 40px; /* Adjust height as needed, width adjusts automatically */
  object-fit: contain;
}


.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
}
.nav-links a {
  color: var(--muted2);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--gold); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-socials {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-social-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.nav-social-icon:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}

.nav-cta {
  background: var(--gold);
  color: #000;
  padding: 9px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.82rem;
  text-decoration: none;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-cta:hover {
  background: var(--gold2);
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(255,184,0,0.4);
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 6px;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: all 0.3s;
}

/* MOBILE NAV */
.mobile-nav {
  display: none;
  position: fixed;
  top: 72px; left: 0; right: 0;
  background: rgba(5,5,8,0.97);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 24px;
  z-index: 999;
  flex-direction: column;
  gap: 16px;
}
.mobile-nav.open { display: flex; }
.mobile-nav a {
  color: var(--text);
  text-decoration: none;
  font-size: 1rem;
  font-weight: 500;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

/* ═══ HERO ═══ */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 120px 48px 80px;
  overflow: hidden;
  z-index: 1;
}

.hero-glow {
  position: absolute;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(255,184,0,0.1) 0%, transparent 70%);
  top: -200px; right: -200px;
  pointer-events: none;
}
.hero-glow2 {
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(91,143,255,0.08) 0%, transparent 70%);
  bottom: -100px; left: -100px;
  pointer-events: none;
}

.hero-content {
  max-width: 800px;
  position: relative;
  z-index: 2;
}

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--gold-dim);
  border: 1px solid var(--border2);
  padding: 7px 16px;
  border-radius: 999px;
  font-size: 0.78rem;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 28px;
  animation: slideUp 0.6s ease both;
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

.hero-headline {
  font-family: var(--font-display);
  font-size: clamp(4rem, 9vw, 9rem);
  line-height: 0.9;
  letter-spacing: -2px;
  margin-bottom: 24px;
  animation: slideUp 0.6s 0.1s ease both;
}
.hero-headline .line1 { display: block; color: var(--text); }
.hero-headline .line2 { display: block; color: var(--gold); }
.hero-headline .line3 { display: block; color: var(--muted); font-size: 0.65em; }

.hero-sub {
  color: var(--muted2);
  font-size: 1.1rem;
  line-height: 1.7;
  max-width: 560px;
  margin-bottom: 40px;
  animation: slideUp 0.6s 0.2s ease both;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  animation: slideUp 0.6s 0.3s ease both;
}

.btn-gold {
  background: var(--gold);
  color: #000;
  padding: 14px 32px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 0.92rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn-gold:hover {
  background: var(--gold2);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(255,184,0,0.4);
}

.btn-outline {
  background: transparent;
  color: var(--text);
  padding: 14px 32px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 0.92rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border2);
  transition: all 0.2s;
}
.btn-outline:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}

.hero-years {
  position: absolute;
  right: 48px;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.hero-years-num {
  font-family: var(--font-display);
  font-size: 8rem;
  line-height: 1;
  color: transparent;
  -webkit-text-stroke: 2px rgba(255,184,0,0.3);
}
.hero-years-label {
  font-size: 0.75rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}

/* FIXED SCROLL INDICATOR */
.hero-scroll {
  position: absolute;
  bottom: 32px;
  left: 50%; /* Center horizontally */
  transform: translateX(-50%); /* Adjust exact center */
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 0.72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 2;
  width: auto; /* Ensures it doesn't take full width and mess up positioning */
}
.scroll-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}

/* ═══ PORTFOLIO (MOVED UP) ═══ */
.portfolio-section {
  padding: 0 0 80px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.main-tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 48px;
  scrollbar-width: none;
}
.main-tab-bar::-webkit-scrollbar { display: none; }

.main-tab-btn {
  padding: 18px 24px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.88rem;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: -1px;
}
.main-tab-btn:hover { color: var(--text); }
.main-tab-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.tab-content { display: none; padding: 40px 48px 0; }
.tab-content.active { display: block; }

/* CATEGORY FILTER */
.cat-filter {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
.cat-btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted2);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
  white-space: nowrap;
}
.cat-btn:hover { border-color: var(--border2); color: var(--text); }
.cat-btn.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
  font-weight: 600;
}

/* ═════════════════════════════ */
/* VIDEO GRID  */
/* ═════════════════════════════ */
.vid-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.vid-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.3s;
  position: relative;
  display: flex;
  flex-direction: column;
}
.vid-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,184,0,0.2);
  border-color: rgba(255,184,0,0.3);
}

.vid-frame {
  position: relative;
  padding-top: 177.77%; 
  background: #000;
  border-bottom: 1px solid var(--border);
}
.vid-frame iframe {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: none;
}
.vid-badge {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(5,5,8,0.9);
  border: 1px solid var(--border2);
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 0.68rem;
  color: var(--gold);
  font-weight: 700;
}
.vid-result {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(0,40,20,0.9);
  border: 1px solid rgba(0,229,160,0.3);
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 0.68rem;
  color: var(--green);
  font-weight: 700;
}

.vid-body { padding: 18px; flex-grow: 1; }
.vid-title {
  font-family: var(--font-ui);
  font-size: 0.98rem;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.3;
}
.vid-desc { font-size: 0.8rem; color: var(--muted2); line-height: 1.5; margin-bottom: 12px; }
.vid-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.vtag {
  font-size: 0.68rem;
  padding: 3px 8px;
  border-radius: 5px;
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid var(--border2);
}
.vtag.g { background: rgba(0,229,160,0.08); color: var(--green); border-color: rgba(0,229,160,0.2); }

/* SCREENSHOT GRID */
.shot-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.shot-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.3s;
}
.shot-card:hover {
  transform: translateY(-6px);
  border-color: rgba(255,184,0,0.3);
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.shot-media {
  position: relative;
  height: 220px;
  background: var(--surface);
  overflow: hidden;
}
.shot-media img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
.shot-card:hover .shot-media img { transform: scale(1.05); }
.shot-ph {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: linear-gradient(135deg, #0f0f1a, #1a1200);
}
.shot-ph-icon { font-size: 2.8rem; opacity: 0.3; }
.shot-ph-text {
  font-size: 0.75rem;
  color: var(--muted);
  border: 1px dashed var(--border2);
  padding: 5px 12px;
  border-radius: 5px;
}
.shot-body { padding: 18px; }
.shot-title { font-family: var(--font-ui); font-size: 0.95rem; font-weight: 600; margin-bottom: 6px; }
.shot-desc { font-size: 0.8rem; color: var(--muted2); line-height: 1.5; margin-bottom: 12px; }

/* EMPTY */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  background: var(--card);
  border: 2px dashed var(--border2);
  border-radius: 16px;
}
.empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.3; }
.empty-title { font-family: var(--font-ui); font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
.empty-desc { font-size: 0.84rem; color: var(--muted); line-height: 1.6; }
.empty-label {
  display: inline-block;
  margin-top: 16px;
  background: var(--gold-dim);
  border: 1px solid var(--border2);
  color: var(--gold);
  font-size: 0.72rem;
  padding: 5px 14px;
  border-radius: 6px;
  font-weight: 600;
}

/* ═══ STATS ═══ */
.stats-strip {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.stat-block {
  padding: 36px 24px;
  text-align: center;
  border-right: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  transition: background 0.3s;
}
.stat-block:last-child { border-right: none; }
.stat-block::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 2px;
  background: var(--gold);
  transition: width 0.4s;
}
.stat-block:hover::before { width: 60%; }
.stat-block:hover { background: var(--gold-dim); }

.stat-num {
  font-family: var(--font-ui);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--gold);
  display: block;
}
.stat-label {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.5px;
}
.stat-platform {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 2px;
  opacity: 0.7;
}

/* ═══ SECTION COMMON ═══ */
section { position: relative; z-index: 1; }

.section-wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 48px;
}

.section-intro {
  text-align: center;
  padding: 80px 48px 48px;
  max-width: 700px;
  margin: 0 auto;
}

.section-eyebrow {
  font-size: 0.7rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 12px;
  display: block;
}

.section-title {
  font-family: var(--font-ui);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 14px;
}

.section-desc {
  color: var(--muted2);
  font-size: 0.97rem;
  line-height: 1.7;
}

/* ═══ SERVICES ═══ */
.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  background: var(--border);
  margin: 0 48px 80px;
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}

.service-card {
  background: var(--card);
  padding: 40px 32px;
  transition: background 0.3s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.service-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s;
}
.service-card:hover { background: var(--card2); }
.service-card:hover::before { transform: scaleX(1); }

.service-icon {
  font-size: 2.4rem;
  margin-bottom: 20px;
  display: block;
}
.service-title {
  font-family: var(--font-ui);
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}
.service-desc {
  font-size: 0.85rem;
  color: var(--muted2);
  line-height: 1.65;
  margin-bottom: 20px;
}
.service-features {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.sftag {
  font-size: 0.68rem;
  padding: 3px 9px;
  border-radius: 5px;
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid var(--border2);
  font-weight: 600;
}


/* ═══ RESULTS STRIP ═══ */
.results-section {
  padding: 80px 48px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.results-header { text-align: center; margin-bottom: 48px; }
.results-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
}
.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.result-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--green));
  transform: scaleX(0);
  transition: transform 0.4s;
}
.result-card:hover { transform: translateY(-4px); border-color: rgba(255,184,0,0.25); }
.result-card:hover::after { transform: scaleX(1); }

.result-platform {
  font-size: 0.72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--muted);
}
.result-metric {
  font-family: var(--font-ui);
  font-size: 2.6rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 6px;
}
.result-label { font-size: 0.88rem; color: var(--muted2); margin-bottom: 16px; }
.result-bar-wrap {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.result-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--green));
  border-radius: 2px;
  transition: width 1.5s ease;
}

/* ═══ PRICING ═══ */
.pricing-section {
  padding: 80px 48px;
  background: var(--bg);
}
.pricing-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 1100px;
  margin: 48px auto 0;

function renderGrid(tab, cat) {
  const gridId = tab + '-grid';
  const grid = document.getElementById(gridId);
  if (!grid) return;

  const items = (DATA[tab] || []).filter(i => cat === 'all' || i.cat === cat);

  if (items.length === 0) {
    const icons = { ugc:'🎬', fb:'📘', google:'🔍', smm:'📱' };
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${icons[tab]}</div>
        <div class="empty-title">Content Coming Soon</div>
        <div class="empty-desc">Portfolio updates are in progress. Stay tuned for our latest results!</div>
      </div>`;
    return;
  }

  if (tab === 'ugc') {
    grid.innerHTML = items.map(v => `
      <div class="vid-card">
        <div class="vid-frame">
          <iframe src="https://www.youtube.com/embed/${v.id}?rel=0" allowfullscreen loading="lazy"></iframe>
          ${v.badge ? `<div class="vid-badge">${v.badge}</div>` : ''}
          ${v.result ? `<div class="vid-result">${v.result}</div>` : ''}
        </div>
        <div class="vid-body">
          <div class="vid-title">${v.title}</div>
          <div class="vid-desc">${v.desc||''}</div>
          ${v.tags ? `<div class="vid-tags">${v.tags.map((t,i) => `<span class="vtag ${i===v.tags.length-1?'g':''}">${t}</span>`).join('')}</div>` : ''}
        </div>
      </div>`).join('');
  } else {
    grid.innerHTML = items.map(s => `
      <div class="shot-card">
        <div class="shot-media">
          ${s.img
            ? `<img src="${s.img}" alt="${s.title}" loading="lazy">`
            : `<div class="shot-ph"><span class="shot-ph-icon">📊</span><span class="shot-ph-text">Screenshot Placeholder</span></div>`}
          ${s.badge ? `<div class="vid-badge">${s.badge}</div>` : ''}
          ${s.result ? `<div class="vid-result">${s.result}</div>` : ''}
        </div>
        <div class="shot-body">
          <div class="shot-title">${s.title}</div>
          <div class="shot-desc">${s.desc||''}</div>
          ${s.tags ? `<div class="vid-tags">${s.tags.map(t=>`<span class="vtag">${t}</span>`).join('')}</div>` : ''}
        </div>
      </div>`).join('');
  }
}

// RESULT BARS ANIMATION
// ═══════════════════════════════════════════════
function animateBars() {
  const bars = document.querySelectorAll('.result-bar[data-width]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.width = entry.target.dataset.width;
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });
  bars.forEach(bar => observer.observe(bar));
}

  const footer = document.querySelector('footer');
  if (!footer || !floatCta) return;
  floatCta.style.opacity = footer.getBoundingClientRect().top < 120 ? '0' : '1';
  floatCta.style.pointerEvents = footer.getBoundingClientRect().top < 120 ? 'none' : 'all';
});
